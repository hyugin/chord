name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        run: |
          VERSION="$(./scripts/bump-version.sh)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Resources/Info.plist
          git commit -m "chore(release): bump version to ${VERSION} [skip ci]"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build app
        run: |
          swift --version
          ./scripts/build.sh

      - name: Create DMG
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: ./scripts/create-dmg.sh

      - name: Compute checksum
        id: checksum
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          DMG="dist/chord-${VERSION}.dmg"
          SHA256="$(shasum -a 256 "$DMG" | awk '{print $1}')"
          printf '%s  %s\n' "$SHA256" "chord-${VERSION}.dmg" > "${DMG}.sha256"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git tag "v${VERSION}"
          git push origin main
          git push origin "v${VERSION}"

      - name: Publish GitHub Release
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          SHA256: ${{ steps.checksum.outputs.sha256 }}
          GH_TOKEN: ${{ github.token }}
        run: |
          GENERATED="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="v${VERSION}" \
            -f target_commitish="main" \
            --jq .body)"

          cat > release-notes.md <<EOF
          ${GENERATED}

          ## Verify download

          \`\`\`text
          SHA-256: ${SHA256}
          \`\`\`

          After downloading \`chord-${VERSION}.dmg\` and \`chord-${VERSION}.dmg.sha256\`, run:

          \`\`\`bash
          shasum -a 256 -c chord-${VERSION}.dmg.sha256
          \`\`\`

          A matching checksum confirms the file was not altered after the release was published.

          ## Install (ad-hoc signed)

          From the folder with the DMG:

          \`\`\`bash
          DMG="chord-${VERSION}.dmg"
          hdiutil attach "\$DMG" -nobrowse -quiet
          cp -R "/Volumes/Chord/Chord.app" /Applications/
          xattr -cr /Applications/Chord.app
          open /Applications/Chord.app
          hdiutil detach "/Volumes/Chord" -quiet
          \`\`\`

          Or drag **Chord** to Applications, then: \`xattr -cr /Applications/Chord.app && open /Applications/Chord.app\`

          That clears the download quarantine flag so you can skip System Settings → Open Anyway. Repeat after every new download (each release has a new ad-hoc code hash). The DMG includes **How to Install.txt** with the same steps.

          A \`.command\` helper is not shipped on purpose: macOS shows the same malware dialog for any downloaded executable.
          EOF

          gh release create "v${VERSION}" \
            "dist/chord-${VERSION}.dmg" \
            "dist/chord-${VERSION}.dmg.sha256" \
            --title "Chord v${VERSION}" \
            --notes-file release-notes.md
